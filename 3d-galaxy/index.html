<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Galaxy — Three.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    .info-panel {
      position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.85);
      z-index: 10; background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
      padding: 20px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      max-width: 340px;
    }
    .info-panel h1 {
      font-size: 1.4rem; margin-bottom: 4px;
      background: linear-gradient(135deg, #ff6ec7, #7a5cff, #00d2ff, #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .info-panel p { font-size: 0.82rem; opacity: 0.6; margin-bottom: 14px; }
    .controls { display: flex; flex-direction: column; gap: 8px; }
    .controls label {
      display: flex; flex-direction: column; font-size: 0.78rem; gap: 3px;
      color: rgba(255,255,255,0.65);
    }
    .controls input[type="range"] { width: 100%; accent-color: #7a5cff; }
    .controls button {
      margin-top: 4px; padding: 7px 14px; border: 1px solid rgba(122,92,255,0.4);
      background: rgba(122,92,255,0.12); color: #c4b5ff; border-radius: 8px;
      cursor: pointer; font-size: 0.78rem; transition: all 0.3s;
    }
    .controls button:hover { background: rgba(122,92,255,0.3); }
    @media (max-width: 480px) {
      .info-panel { left: 10px; right: 10px; bottom: 10px; max-width: none; padding: 14px 18px; }
      .info-panel h1 { font-size: 1.1rem; }
      .info-panel p { font-size: 0.78rem; }
      .controls label { font-size: 0.72rem; }
      .controls button { font-size: 0.72rem; padding: 6px 12px; }
    }

    .back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 10;
      padding: 8px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7); border-radius: 8px; text-decoration: none;
      font-size: 0.82rem; transition: all 0.3s; backdrop-filter: blur(8px);
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  </style>
</head>
<body>
  <a class="back-btn" href="../index.html">← Gallery</a>

  <div class="info-panel">
    <h1>3D Galaxy</h1>
    <p>Drag to orbit · Scroll to zoom · Move mouse for glow</p>
    <div class="controls">
      <label>Stars: <span id="countDisplay">15000</span>
        <input type="range" id="starCount" min="3000" max="50000" step="1000" value="15000">
      </label>
      <label>Spiral Arms: <span id="armsDisplay">5</span>
        <input type="range" id="arms" min="2" max="8" value="5">
      </label>
      <label>Rotation Speed: <span id="speedDisplay">1.0</span>
        <input type="range" id="rotSpeed" min="1" max="40" value="10">
      </label>
      <label>Star Size: <span id="sizeDisplay">1.0</span>
        <input type="range" id="starSize" min="3" max="20" value="10">
      </label>
      <button id="morphBtn">Morph Shape</button>
      <button id="colorBtn">Change Palette</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="galaxy.js"></script>
</body>
</html>
