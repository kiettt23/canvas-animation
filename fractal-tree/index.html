<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Tree Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    .info-panel {
      position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.85);
      z-index: 10; background: rgba(10,10,26,0.7); backdrop-filter: blur(10px);
      padding: 20px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      max-width: 320px;
    }
    .info-panel h1 {
      font-size: 1.4rem; margin-bottom: 4px;
      background: linear-gradient(135deg, #00ff87, #60efff, #ff6ec7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .info-panel p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 12px; }
    .controls { display: flex; flex-direction: column; gap: 8px; }
    .controls label { display: flex; flex-direction: column; font-size: 0.8rem; gap: 4px; color: rgba(255,255,255,0.7); }
    .controls input[type="range"] { width: 100%; accent-color: #00ff87; }
    .controls button {
      margin-top: 6px; padding: 8px 16px; border: 1px solid rgba(0,255,135,0.5);
      background: rgba(0,255,135,0.15); color: #80ffbb; border-radius: 8px;
      cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
    }
    .controls button:hover { background: rgba(0,255,135,0.35); }
    @media (max-width: 480px) {
      .info-panel { left: 10px; right: 10px; bottom: 10px; max-width: none; padding: 14px 18px; }
      .info-panel h1 { font-size: 1.1rem; }
      .info-panel p { font-size: 0.78rem; }
      .controls label { font-size: 0.75rem; }
      .controls button { font-size: 0.75rem; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="info-panel">
    <h1>Fractal Tree</h1>
    <p>Move mouse left/right to change wind direction</p>
    <div class="controls">
      <label>Depth: <span id="depthDisplay">10</span>
        <input type="range" id="depth" min="4" max="13" value="10">
      </label>
      <label>Branch Angle: <span id="angleDisplay">25</span>°
        <input type="range" id="angle" min="10" max="50" value="25">
      </label>
      <button id="regrow">Regrow Tree</button>
    </div>
  </div>
  <script src="fractal-tree.js"></script>
</body>
</html>
