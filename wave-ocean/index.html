<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Ocean Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    .info-panel {
      position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.85);
      z-index: 10; background: rgba(0,20,60,0.6); backdrop-filter: blur(10px);
      padding: 20px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      max-width: 320px;
    }
    .info-panel h1 {
      font-size: 1.4rem; margin-bottom: 4px;
      background: linear-gradient(135deg, #00b4d8, #0077b6, #90e0ef);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .info-panel p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 12px; }
    .controls { display: flex; flex-direction: column; gap: 8px; }
    .controls label { display: flex; flex-direction: column; font-size: 0.8rem; gap: 4px; color: rgba(255,255,255,0.7); }
    .controls input[type="range"] { width: 100%; accent-color: #00b4d8; }
    .controls button {
      margin-top: 6px; padding: 8px 16px; border: 1px solid rgba(0,180,216,0.5);
      background: rgba(0,180,216,0.15); color: #90e0ef; border-radius: 8px;
      cursor: pointer; font-size: 0.8rem; transition: all 0.3s;
    }
    .controls button:hover { background: rgba(0,180,216,0.35); }
    @media (max-width: 480px) {
      .info-panel { left: 10px; right: 10px; bottom: 10px; max-width: none; padding: 14px 18px; }
      .info-panel h1 { font-size: 1.1rem; }
      .info-panel p { font-size: 0.78rem; }
      .controls label { font-size: 0.75rem; }
      .controls button { font-size: 0.75rem; padding: 6px 12px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="info-panel">
    <h1>Ocean Waves</h1>
    <p>Move mouse to create ripples</p>
    <div class="controls">
      <label>Wave Layers: <span id="layerDisplay">5</span>
        <input type="range" id="layers" min="2" max="8" value="5">
      </label>
      <label>Wave Height: <span id="heightDisplay">50</span>
        <input type="range" id="waveHeight" min="10" max="100" value="50">
      </label>
      <label>Wave Speed: <span id="speedDisplay">1.0</span>
        <input type="range" id="waveSpeed" min="1" max="30" value="10">
      </label>
      <button id="toggleTime">Toggle Day/Night</button>
    </div>
  </div>
  <script src="wave-ocean.js"></script>
</body>
</html>
