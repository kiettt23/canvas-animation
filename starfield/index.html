<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield Galaxy Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    .info-panel {
      position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.85);
      z-index: 10; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      padding: 20px 28px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
      max-width: 320px;
    }
    .info-panel h1 {
      font-size: 1.4rem; margin-bottom: 4px;
      background: linear-gradient(135deg, #ffd700, #ff6ec7, #00d2ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .info-panel p { font-size: 0.85rem; opacity: 0.7; margin-bottom: 12px; }
    .controls { display: flex; flex-direction: column; gap: 8px; }
    .controls label { display: flex; flex-direction: column; font-size: 0.8rem; gap: 4px; color: rgba(255,255,255,0.7); }
    .controls input[type="range"] { width: 100%; accent-color: #ffd700; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="info-panel">
    <h1>Starfield Galaxy</h1>
    <p>Move mouse to steer through the stars</p>
    <div class="controls">
      <label>Stars: <span id="countDisplay">800</span>
        <input type="range" id="starCount" min="200" max="2000" value="800">
      </label>
      <label>Warp Speed: <span id="speedDisplay">1.0</span>
        <input type="range" id="warpSpeed" min="1" max="50" value="10">
      </label>
    </div>
  </div>
  <script src="starfield.js"></script>
</body>
</html>
